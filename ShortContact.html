<!-- COOKSCAPE POPUP -->
<div
  id="cookscapePopupOverlay"
  style="
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    z-index: 9999;
  "
>
  <div
    style="
      max-width: 400px;
      margin: 6% auto;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
      position: relative;
    "
  >
    <!-- Close -->
    <div
      onclick="closeCookscapePopup()"
      style="
        z-index: 999;
        position: absolute;
        top: 10px;
        right: 10px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #000;
        color: white;
        text-align: center;
        line-height: 32px;
        font-size: 18px;
        cursor: pointer;
      "
    >
      ×
    </div>

    <!-- Header Image -->
    <div
      style="
        background: url(&quot;/assets/images/resource/about-3.jpg&quot;)
          center/cover;
        height: 180px;
        position: relative;
      "
    >
      <div
        style="
          position: absolute;
          left: 15px;
          top: 15px;
          background: #e11d48;
          color: white;
          padding: 8px 14px;
          border-radius: 20px;
          font-weight: 600;
          font-size: 13px;
        "
      >
        COOKSCAPE FESTIVE OFFER
      </div>
      <div
        style="
          position: absolute;
          right: 15px;
          bottom: 15px;
          background: white;
          padding: 10px 16px;
          border-radius: 12px;
          font-weight: 700;
        "
      >
        Flat 20% OFF<br /><span style="font-size: 13px; font-weight: 400"
          >on interiors</span
        >
      </div>
    </div>

    <!-- Body -->
    <div style="padding: 20px">
      <h4 style="margin-bottom: 15px">Fill details to unlock your offer</h4>

      <input
        placeholder="Enter your name"
        id="shortcontactName"
        style="
          width: 100%;
          padding: 12px;
          border-radius: 8px;
          border: 1px solid #ddd;
          margin-bottom: 12px;
        "
      />
      <div
        class="error"
        id="errName"
        style="color: #e11d48; font-size: 12px; margin-bottom: 10px"
      ></div>

      <input
        placeholder="Enter Mobile No"
        id="shortcontactMobile"
        style="
          width: 100%;
          padding: 12px;
          border-radius: 8px;
          border: 1px solid #ddd;
          margin-bottom: 12px;
        "
      />
      <div
        class="error"
        id="errMobile"
        style="color: #e11d48; font-size: 12px; margin-bottom: 10px"
      ></div>

      <input
        placeholder="Enter your email"
        id="shortcontactEmail"
        style="
          width: 100%;
          padding: 12px;
          border-radius: 8px;
          border: 1px solid #ddd;
          margin-bottom: 12px;
        "
      />
      <div
        class="error"
        id="errEmail"
        style="color: #e11d48; font-size: 12px; margin-bottom: 10px"
      ></div>

      <p style="font-size: 12px; color: #777">
        By continuing, I agree to Cookscape’s
        <span style="color: #ef4444">><a href="/terms">Terms of Use</a></span> &
        <span style="color: #ef4444"
          ><a href="/privacy-policy">Privacy Policy</a></span
        >
      </p>

      <button
        id="btnSubmitShortContact"
        style="
          width: 100%;
          margin-top: 12px;
          padding: 14px;
          background: #e11d48;
          color: white;
          border: none;
          border-radius: 10px;
          font-size: 16px;
        "
      >
        CONTINUE
      </button>
    </div>
  </div>
</div>

<script>
  function showCookscapePopup() {
    if (hasSubmittedToday()) return;
    document.getElementById("cookscapePopupOverlay").style.display = "block";
  }
  function closeCookscapePopup() {
    document.getElementById("cookscapePopupOverlay").style.display = "none";
  }
</script>

<input type="hidden" name="country" value="India" />
<input type="hidden" name="region" value="Tamil Nadu" />
<input type="hidden" name="city" value="Chennai" />
<input type="hidden" name="browser" value="Chrome" />
<input type="hidden" name="version" value="" />
<input type="hidden" name="platform" value="Windows" />

<script type="text/javascript">
  var BrowserDetect = {
    init: function () {
      if (this.browser && this.version && this.os) {
        return;
      }
      this.browser =
        this.searchString(this.dataBrowser) || "An unknown browser";
      this.version =
        this.searchVersion(navigator.userAgent) ||
        this.searchVersion(navigator.appVersion) ||
        "an unknown version";
      this.OS = this.searchString(this.dataOS) || "an unknown OS";
    },
    searchString: function (data) {
      for (var i = 0; i < data.length; i++) {
        var dataString = data[i].string;
        var dataProp = data[i].prop;
        this.versionSearchString = data[i].versionSearch || data[i].identity;
        if (dataString) {
          var subStrings = data[i].subString.split(",");
          var matchFound = false;
          for (var j = 0; j < subStrings.length; j++) {
            if (dataString.indexOf(subStrings[j]) == -1) {
              matchFound = false;
              break;
            }
            matchFound = true;
          }
          if (matchFound) {
            return data[i].identity;
          }
        } else if (dataProp) return data[i].identity;
      }
    },
    searchVersion: function (dataString) {
      var index = dataString.indexOf(this.versionSearchString);
      if (index == -1) return;
      var ver = parseFloat(
        dataString.substring(index + this.versionSearchString.length + 1),
      );
      // In case of IE 8/9/10 is running in compatibility mode.
      // We are using 'Trident/(4/5/6)' token in the
      // userAgent to figure out the actual browser
      // version.
      if (this.browser == "Explorer" && 7.0 <= ver) {
        if (dataString.indexOf("Trident/4") != -1) {
          ver = 8.0;
        } else if (dataString.indexOf("Trident/5") != -1) {
          ver = 9.0;
        } else if (dataString.indexOf("Trident/6") != -1) {
          ver = 10.0;
        }
      }
      return ver;
    },
    dataBrowser: [
      {
        string: navigator.userAgent,
        subString: "Chrome",
        identity: "Chrome",
      },
      {
        string: navigator.userAgent,
        subString: "OmniWeb",
        versionSearch: "OmniWeb/",
        identity: "OmniWeb",
      },
      {
        string: navigator.vendor,
        subString: "Apple",
        identity: "Safari",
        versionSearch: "Version",
      },
      {
        prop: window.opera,
        identity: "Opera",
      },
      {
        string: navigator.vendor,
        subString: "iCab",
        identity: "iCab",
      },
      {
        string: navigator.vendor,
        subString: "KDE",
        identity: "Konqueror",
      },
      {
        string: navigator.userAgent,
        subString: "Firefox",
        identity: "Firefox",
      },
      {
        string: navigator.vendor,
        subString: "Camino",
        identity: "Camino",
      },
      {
        // for newer Netscapes (6+)
        string: navigator.userAgent,
        subString: "Netscape",
        identity: "Netscape",
      },
      {
        string: navigator.userAgent,
        subString: "MSIE",
        identity: "Explorer",
        versionSearch: "MSIE",
      },
      {
        // for IE11 and above
        string: navigator.userAgent,
        subString: "Windows,Trident",
        identity: "Explorer",
        versionSearch: "rv",
      },
      {
        string: navigator.userAgent,
        subString: "Gecko",
        identity: "Mozilla",
        versionSearch: "rv",
      },
      {
        // for older Netscapes (4-)
        string: navigator.userAgent,
        subString: "Mozilla",
        identity: "Netscape",
        versionSearch: "Mozilla",
      },
    ],
    dataOS: [
      {
        string: navigator.userAgent,
        subString: "iPhone",
        identity: "iOS",
      },
      {
        string: navigator.userAgent,
        subString: "iPad",
        identity: "iOS",
      },
      {
        string: navigator.userAgent,
        subString: "Android",
        identity: "Android",
      },
      {
        string: navigator.userAgent,
        subString: "Windows Phone",
        identity: "Windows Phone",
      },
      {
        string: navigator.platform,
        subString: "Win",
        identity: "Windows",
      },
      {
        string: navigator.platform,
        subString: "Mac",
        identity: "Mac",
      },
      {
        string: navigator.platform,
        subString: "Linux",
        identity: "Linux",
      },
      {
        string: navigator.userAgent,
        subString: "Mobile",
        identity: "Mobile",
      },
    ],
  };
  BrowserDetect.init();

  $(document).ready(function () {
    setTimeout(function () {
      if ($("input[name=browser]").val()) {
        return;
      }

      $("input[name=browser]").val(BrowserDetect.browser);
      $("input[name=platform]").val(BrowserDetect.OS);
      $("input[name=version]").val(BrowserDetect.version);
      var geoIpUrl = "//c.webengage.com/geoip/";
      if (!$("input[name=country]").val()) {
        $.ajax({
          url: geoIpUrl,
          dataType: "jsonp",
          success: function (data) {
            $("input[name=country]").val(data.country);
            $("input[name=region]").val(data.region);
            $("input[name=city]").val(data.city);
          },
        });
      }
    }, 1000);
  });
</script>
